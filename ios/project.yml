name: FinanceTracker

options:
  deploymentTarget:
    iOS: "26.0"
  bundleIdPrefix: com.armandointeligencia
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: "Automatic"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_OBJC_WEAK: "YES"
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"

targets:
  FinanceTracker:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FinanceTracker
    resources:
      - path: FinanceTracker/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armandointeligencia.FinanceTracker
        # TestFlight v1.0.0 (slice 10). Bump CURRENT_PROJECT_VERSION on
        # every fresh archive uploaded to App Store Connect — Apple
        # rejects a re-upload at the same build number.
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # TODO before first TestFlight upload: set DEVELOPMENT_TEAM at
        # the project level (see settings.base above) to your Apple
        # Developer Team ID from developer.apple.com → Membership.
        ENABLE_PREVIEWS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        # Slice 10: we provide an explicit UILaunchScreen dict in `info`
        # below, so the auto-generation flag must be off — otherwise
        # Xcode silently overrides our colors with a blank white screen.
        INFOPLIST_KEY_UILaunchScreen_Generation: "NO"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Finance Tracker"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    info:
      path: FinanceTracker/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: "Finance Tracker uses the camera to scan receipts and turn them into expenses automatically."
        NSFaceIDUsageDescription: "Use Face ID to unlock Finance Tracker."
        NSPhotoLibraryUsageDescription: "Attach receipts from your photo library to extract amount and merchant automatically."
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
        # Slice 10: dark navy background tinted to match the app icon, with
        # the app's display name centered. Avoids the white-flash that the
        # default empty UILaunchScreen produces on cold launch.
        UILaunchScreen:
          UIColorName: "LaunchBackground"
          UIImageName: "LaunchLogo"

  FinanceTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FinanceTrackerTests
    dependencies:
      - target: FinanceTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.armandointeligencia.FinanceTrackerTests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  FinanceTracker:
    build:
      targets:
        FinanceTracker: all
        FinanceTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FinanceTrackerTests
