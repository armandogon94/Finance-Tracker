services:
  finance-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8040:8002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finance_db
      JWT_SECRET: dev-secret-not-for-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OCR_MODE: auto
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4}
      RECEIPT_STORAGE_PATH: /data/receipts
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3040","https://localhost:3040"]'
    volumes:
      - ./backend/src:/app/src
      - receipt_data:/data/receipts
    command: uvicorn src.app.main:app --reload --host 0.0.0.0 --port 8002
    restart: unless-stopped

  finance-web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3040:3000"
    depends_on:
      - finance-api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8040
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  receipt_data:
    driver: local
  postgres_data:
    driver: local
  frontend_node_modules:
    driver: local
